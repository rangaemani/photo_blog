databases:
  - name: photoblog-db
    plan: free
    databaseName: photoblog
    user: photoblog_user

services:
  - type: web
    name: photoblog-api
    runtime: python
    plan: free
    rootDir: backend/photo_blog
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn photo_blog.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: photoblog-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://YOUR_SITE.pages.dev"
      - key: PYTHON_VERSION
        value: "3.13"
      - key: R2_BASE_URL
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.resend.com"
      - key: EMAIL_PORT
        value: "465"
      - key: EMAIL_HOST_USER
        value: "resend"
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_SSL
        value: "True"
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: ADMIN_IDENTIFIERS
        sync: false
